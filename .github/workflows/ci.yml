name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        # wdotool links against libxkbcommon and libwayland at build time.
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev

      - name: Install Rust toolchain
        # rustup is already preinstalled on ubuntu-22.04; pin components.
        run: rustup show && rustup component add rustfmt clippy

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        # -D warnings turns clippy findings into errors so regressions show up
        # as a red CI. Remove individual lints with #[allow] at the use site,
        # not by weakening this flag.
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --all-targets --locked

  npm-capabilities:
    name: npm package (@wdotool/capabilities)
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: packaging/npm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packaging/npm/package-lock.json

      - name: Install
        run: npm ci

      - name: Build + test
        # `npm test` runs the sync script, tsc, then node --test. If the
        # JSON schema in docs/ drifts from the locked enums in src/types.ts,
        # the schema-vs-types tests fail here.
        run: npm test

  # Layer 3 round-trip tests: spin up a headless sway compositor for each
  # test, spawn the wdotool-observer Wayland client inside it, drive
  # wdotool against the same display, and assert on what events the
  # compositor actually delivered to a real client. See docs/testing.md.
  # Separate from `check` because it needs sway installed and is somewhat
  # slower (real compositor startup per test, ~1s each).
  headless-roundtrip:
    name: round-trip (headless sway)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        # libxkbcommon + libwayland for the build, sway for the headless
        # compositor the round-trip tests run inside.
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev sway

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-roundtrip-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build workspace + tests
        # --all-targets so the wdotool-observer bin gets built. cargo
        # build --tests by itself only builds test artifacts; bins from
        # other workspace packages are needed at test time and won't be
        # there without --all-targets (or --bins on top of --tests).
        run: cargo build --workspace --all-targets --locked

      - name: Run round-trip tests
        # WLR_RENDERER=pixman forces software rendering. GitHub runners
        # have no GPU / DRM device, so wlroots' default GBM/EGL path
        # won't initialize. Pixman is fine for headless: we never
        # actually render anything visible.
        #
        # The cli_roundtrip suite serializes itself via a file-level
        # SUITE_LOCK mutex, so we don't need --test-threads=1 here.
        env:
          WLR_RENDERER: pixman
        run: cargo test -p wdotool --test cli_roundtrip --locked
