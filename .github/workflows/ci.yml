name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        # wdotool links against libxkbcommon and libwayland at build time.
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev

      - name: Install Rust toolchain
        # rustup is already preinstalled on ubuntu-22.04; pin components.
        run: rustup show && rustup component add rustfmt clippy

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        # -D warnings turns clippy findings into errors so regressions show up
        # as a red CI. Remove individual lints with #[allow] at the use site,
        # not by weakening this flag.
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --all-targets --locked

  integration:
    name: wlroots backend boot (cage)
    # Runs a headless wlroots compositor (cage), spawns wdotool inside it,
    # and asserts the wlroots backend actually binds its globals. Catches
    # regressions that fmt/clippy/unit tests can't — e.g. broken registry
    # handlers or protocol version mismatches.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libwayland-dev \
            cage

      - name: Install Rust
        run: rustup show

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo build
        run: cargo build --locked

      - name: wdotool info under headless cage
        env:
          # wlroots software-renders on headless backends when no DRM/libinput
          # is available — perfect for CI runners.
          WLR_BACKENDS: headless
          WLR_LIBINPUT_NO_DEVICES: "1"
          WLR_RENDERER: pixman
        run: |
          set -uo pipefail

          # XDG_RUNTIME_DIR must be a 0700 dir owned by us; /tmp isn't.
          rt=$(mktemp -d)
          chmod 0700 "$rt"
          export XDG_RUNTIME_DIR="$rt"

          # Don't let cage's exit code kill the shell — we want to print
          # both streams regardless so failures are diagnosable.
          set +e
          cage -- ./target/debug/wdotool info > wdotool.out 2> cage.log
          rc=$?
          set -e

          echo "--- wdotool.out ---"
          cat wdotool.out
          echo "--- cage.log ---"
          cat cage.log
          echo "--- cage exited with code: $rc ---"

          if [ $rc -ne 0 ]; then
            echo "::error::cage exited non-zero ($rc)"
            exit 1
          fi

          grep -q 'backend:  wlroots' wdotool.out \
            || { echo "::error::wlroots backend did not boot under cage"; exit 1; }
          grep -q 'pointer_move_relative: true' wdotool.out \
            || { echo "::error::virtual-pointer protocol not bound"; exit 1; }
          grep -q 'key_input:             true' wdotool.out \
            || { echo "::error::virtual-keyboard protocol not bound"; exit 1; }
