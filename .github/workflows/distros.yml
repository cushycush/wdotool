name: Distro packages (.deb + .rpm)

# Runs in parallel with the cargo-dist Release workflow. We build a
# .deb with cargo-deb and a .rpm with cargo-generate-rpm, then wait
# for the GitHub Release to exist (cargo-dist's release.yml creates
# it) and upload both artifacts to it.
#
# Why a separate workflow instead of letting cargo-dist do it:
# cargo-dist 0.31 doesn't produce native distro packages itself, and
# its release.yml is autogenerated (we can't edit it without it
# getting clobbered on regen). A sibling workflow that uploads to the
# same release is the standard escape hatch.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to package (e.g. v0.2.0)"
        required: true
        type: string

jobs:
  build:
    name: ${{ matrix.kind }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - kind: deb
            tool: cargo-deb
            tool_cmd: cargo deb -p wdotool --no-build
            artifact_glob: target/debian/wdotool_*.deb
          - kind: rpm
            tool: cargo-generate-rpm
            tool_cmd: cargo generate-rpm -p wdotool
            artifact_glob: target/generate-rpm/wdotool-*.rpm

    steps:
      - name: Check out tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install system deps
        # libxkbcommon and libwayland-client headers are needed at
        # build time. cargo-dist's release.yml installs the same set.
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.kind }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.kind }}-

      - name: Install ${{ matrix.tool }}
        run: cargo install ${{ matrix.tool }} --locked

      - name: Build release binary
        run: cargo build --release -p wdotool --locked

      - name: Build ${{ matrix.kind }} package
        run: ${{ matrix.tool_cmd }}

      - name: Locate built artifact
        id: artifact
        run: |
          set -euo pipefail
          file=$(ls ${{ matrix.artifact_glob }} | head -1)
          echo "path=${file}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename ${file})" >> "$GITHUB_OUTPUT"

      - name: Wait for the GitHub Release
        # The release object is created by cargo-dist's release.yml
        # running in parallel. Poll for up to ~15 minutes (cargo-dist
        # typically finishes in 3 to 5).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          tries=0
          until gh release view "${TAG}" --repo "${{ github.repository }}" >/dev/null 2>&1; do
            tries=$((tries + 1))
            if [ ${tries} -ge 45 ]; then
              echo "::error::Release ${TAG} did not appear after 15 minutes"
              exit 1
            fi
            echo "(${tries}/45) release ${TAG} not ready yet; sleeping 20s"
            sleep 20
          done
          echo "Release ${TAG} is live."

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          gh release upload "${TAG}" \
            "${{ steps.artifact.outputs.path }}" \
            --repo "${{ github.repository }}" \
            --clobber

      - name: Upload as workflow artifact
        # Mirrored copy in the workflow run, in case a release upload
        # ever silently fails or someone wants to grab the binary
        # without going through the public release.
        uses: actions/upload-artifact@v4
        with:
          name: wdotool-${{ matrix.kind }}
          path: ${{ steps.artifact.outputs.path }}
          retention-days: 14
